name: Code tests macOS

on:
  push:
    branches: [main]
    paths:
      - "book/**"
  pull_request:
    paths:
      - "book/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: book
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: book/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v
