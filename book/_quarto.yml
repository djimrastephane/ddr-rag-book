project:
  type: book
  output-dir: _book

book:
  title: "Building Industrial RAG Systems from Daily Drilling Reports"
  subtitle: "A hands-on guide to retrieval-augmented engineering intelligence"
  author: "Stephane Djimra"
  date: today
  date-format: "MMMM YYYY"
  page-footer:
    left: "Building Industrial RAG Systems from Daily Drilling Reports"
    right: "Built with Quarto"
  repo-url: https://github.com/djimrastephane/ddr-rag-book
  repo-actions: [edit, issue]
  downloads: [pdf]
  sidebar:
    style: docked
    collapse-level: 2

  chapters:
    - index.qmd
    - preface.qmd
    - acknowledgements.qmd

    - part: "Part I — Foundations"
      chapters:
        - chapters/chapter_01.qmd
        - chapters/chapter_02.qmd
        - chapters/chapter_03.qmd
        - chapters/chapter_04.qmd
        - chapters/chapter_05.qmd

    - part: "Part II — Industrialising the System"
      chapters:
        - chapters/chapter_06.qmd
        - chapters/chapter_07.qmd
        - chapters/chapter_08.qmd
        - chapters/chapter_09.qmd
        - chapters/chapter_10.qmd
        - chapters/chapter_11.qmd
        - chapters/chapter_12.qmd

    - part: "Appendices"
      chapters:
        - appendix/appendix_a_environment_setup.qmd
        - appendix/appendix_b_oilfield_glossary.qmd

    - references.qmd

bibliography: references.bib

format:
  html:
    theme:
      light: [cosmo, custom.scss, custom-light.scss]
      dark: [darkly, custom.scss, custom-dark.scss]
    code-fold: false
    code-tools: true
    code-copy: true
    highlight-style: github
    toc: true
    toc-depth: 3
    number-sections: true
    fig-cap-location: bottom
    link-external-newwindow: true

  pdf:
    documentclass: scrbook
    papersize: letter
    toc: true
    number-sections: true
    colorlinks: true
    geometry:
      - margin=1in

execute:
  freeze: auto
  echo: true
  warning: false
  cache: false

jupyter: python3
