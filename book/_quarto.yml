project:
  type: book
  output-dir: _book

book:
  title: "Building Industrial RAG Systems from Daily Drilling Reports"
  subtitle: "A hands-on guide to retrieval-augmented engineering intelligence"
  author: "Stephane Djimra"
  date: today
  date-format: "MMMM YYYY"
  page-footer:
    left: "Building Industrial RAG Systems from Daily Drilling Reports"
    right: "Built with Quarto"
  repo-url: https://github.com/djimrastephane/ddr-rag-book
  repo-actions: [edit, issue]
  downloads: [pdf]
  cover-image: figures/cover.jpg
  cover-image-alt: "Building Industrial RAG Systems from Daily Drilling Reports, book cover showing a drilling rig at sunset with two engineers in the foreground and a pipeline diagram across the bottom half"
  sidebar:
    style: docked
    collapse-level: 2

  chapters:
    - index.qmd
    - preface.qmd
    - acknowledgements.qmd

    - part: "Part 0 — Preparing Your Python Workshop"
      chapters:
        - chapters/chapter_00.qmd

    - part: "Part I — Foundations"
      chapters:
        - chapters/chapter_01.qmd
        - chapters/chapter_02.qmd
        - chapters/chapter_03.qmd
        - chapters/chapter_04.qmd
        - chapters/chapter_05.qmd

    - part: "Part II — Industrialising the System"
      chapters:
        - chapters/chapter_06.qmd
        - chapters/chapter_07.qmd
        - chapters/chapter_08.qmd
        - chapters/chapter_09.qmd
        - chapters/chapter_10.qmd
        - chapters/chapter_11.qmd
        - chapters/chapter_12.qmd

    - part: "Appendices"
      chapters:
        - appendix/appendix_a_environment_setup.qmd
        - appendix/appendix_a1_jupyter.qmd
        - appendix/appendix_a2_vscode.qmd
        - appendix/appendix_a3_pycharm.qmd
        - appendix/appendix_a4_positron.qmd
        - appendix/appendix_a5_terminal.qmd
        - appendix/appendix_b_oilfield_glossary.qmd

    - references.qmd

bibliography: references.bib

format:
  html:
    theme:
      light: [cosmo, custom.scss, custom-light.scss]
      dark: [darkly, custom.scss, custom-dark.scss]
    code-fold: false
    code-tools: true
    code-copy: true
    highlight-style: github
    toc: true
    toc-depth: 3
    number-sections: true
    fig-cap-location: bottom
    link-external-newwindow: true

  pdf:
    documentclass: scrbook
    papersize: letter
    toc: true
    number-sections: true
    colorlinks: true
    geometry:
      - margin=1in
    include-in-header:
      text: |
        % Long inline `code` spans (e.g. file paths) otherwise overflow
        % past the page margin instead of wrapping -- seqsplit allows a
        % break at any character while \ttfamily keeps the monospace font.
        \usepackage{seqsplit}
        \let\oldtexttt\texttt
        \renewcommand{\texttt}[1]{{\ttfamily\seqsplit{#1}}}

        % Long lines inside fenced code blocks (long import paths, CLI
        % commands) otherwise run off the page instead of wrapping. Pandoc's
        % own Highlighting environment is plain fancyvrb, which can't break
        % lines; fvextra extends it so we can redefine Highlighting here to
        % wrap at the page edge, breaking mid-word if there's no other option.
        \usepackage{fvextra}
        \DefineVerbatimEnvironment{Highlighting}{Verbatim}{breaklines,breakanywhere,commandchars=\\\{\}}

        % Real DDR excerpts (quoted in fenced code blocks with no language,
        % e.g. the callouts showing raw report text) come through as plain
        % LaTeX `verbatim`, not the Highlighting environment above -- the
        % kernel's `verbatim` has no concept of line wrapping at all, so
        % long report lines (time breakdowns, BHA tables) ran off the page.
        % Redefine it to route through fvextra's Verbatim instead.
        \renewenvironment{verbatim}{\VerbatimEnvironment\begin{Verbatim}[breaklines,breakanywhere]}{\end{Verbatim}}

execute:
  freeze: auto
  echo: true
  warning: false
  cache: false

jupyter: python3
